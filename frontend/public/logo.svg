<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <rect width="48" height="48" rx="12" fill="#059669"/>
  <!-- Rising arrow / growth chart path -->
  <polyline points="8,34 18,22 26,28 40,12" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Dot at peak -->
  <circle cx="40" cy="12" r="3" fill="#6ee7b7"/>
  <!-- Base dots on the line -->
  <circle cx="8"  cy="34" r="2.5" fill="white" opacity="0.7"/>
  <circle cx="18" cy="22" r="2.5" fill="white" opacity="0.7"/>
  <circle cx="26" cy="28" r="2.5" fill="white" opacity="0.7"/>
</svg>
